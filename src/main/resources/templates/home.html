<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', ui-sans-serif, system-ui, sans-serif;
            background: radial-gradient(circle at top left, #f5f3ff 0%, #eef2ff 35%, #f8fafc 100%);
        }
        .task-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px -8px rgba(88, 28, 135, 0.18);
        }
        .glass-nav {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.85);
        }
    </style>
</head>
<body class="min-h-screen">

<!-- Navbar -->
<nav class="glass-nav sticky top-0 z-10 border-b border-purple-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-purple-600 to-pink-500 flex items-center justify-center text-white font-bold shadow-md">T</div>
            <h1 class="text-2xl font-extrabold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">TaskFlow</h1>
        </div>
        <div class="flex items-center gap-5">
            <div class="hidden sm:flex items-center gap-2 text-gray-600">
                <div class="w-8 h-8 rounded-full bg-purple-100 text-purple-700 flex items-center justify-center font-semibold text-sm">
                    <span th:text="${#authentication?.name != null ? #strings.substring(#authentication.name,0,1).toUpperCase() : 'U'}">U</span>
                </div>
                <span>Hello, <strong class="text-gray-800" th:text="${#authentication?.name} ?: 'User'">User</strong></span>
            </div>
            <a href="/logout" class="bg-white border border-red-200 text-red-600 px-5 py-2.5 rounded-lg hover:bg-red-50 font-medium text-sm transition-colors">Logout</a>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto p-6 md:p-10">
    <div class="mb-8">
        <h2 class="text-3xl md:text-4xl font-extrabold text-gray-800">My Tasks</h2>
        <p class="text-gray-500 mt-1">Stay on top of everything you need to do.</p>
    </div>

    <!-- Add Task Form -->
    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg shadow-purple-100/50 mb-10 border border-gray-100">
        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wide mb-4">Add a new task</h3>
        <form action="/add-task" method="post" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input name="title" placeholder="Task title..." required
                   class="px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition-shadow">
            <input name="description" placeholder="Description"
                   class="px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition-shadow">
            <select name="status"
                    class="px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent bg-white">
                <option value="TODO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="DONE">Done</option>
            </select>
            <button class="bg-gradient-to-r from-purple-600 to-pink-600 text-white font-semibold py-3 rounded-lg hover:opacity-90 transition-opacity shadow-md shadow-purple-200">
                + Add Task
            </button>
        </form>
    </div>

    <!-- Tasks List -->
    <div class="space-y-5">
        <div th:each="task : ${tasks}"
             class="task-card bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden">
            <div class="flex"
                 th:style="'border-left: 6px solid ' +
                     (${task.status} == 'DONE' ? '#22c55e' :
                      (${task.status} == 'IN_PROGRESS' ? '#eab308' : '#ef4444'))">

                <div class="flex-1 p-6 md:p-7">
                    <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-4">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold text-gray-800" th:text="${task.title}">Task</h3>
                            <p class="text-gray-500 mt-1.5 leading-relaxed" th:text="${task.description} ?: 'No description'"></p>

                            <!-- Status Badge -->
                            <span th:switch="${task.status}">
                                <span th:case="DONE" class="inline-flex items-center gap-1.5 mt-4 px-4 py-1.5 rounded-full bg-green-50 text-green-700 font-semibold text-xs uppercase tracking-wide border border-green-200">
                                    <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Done
                                </span>
                                <span th:case="IN_PROGRESS" class="inline-flex items-center gap-1.5 mt-4 px-4 py-1.5 rounded-full bg-yellow-50 text-yellow-700 font-semibold text-xs uppercase tracking-wide border border-yellow-200">
                                    <span class="w-1.5 h-1.5 rounded-full bg-yellow-500"></span> In Progress
                                </span>
                                <span th:case="*" class="inline-flex items-center gap-1.5 mt-4 px-4 py-1.5 rounded-full bg-red-50 text-red-700 font-semibold text-xs uppercase tracking-wide border border-red-200">
                                    <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> To Do
                                </span>
                            </span>
                        </div>

                        <div class="flex gap-2 shrink-0">
                            <a th:href="@{/edit-task/{id}(id=${task.id})}"
                               class="bg-blue-50 text-blue-700 border border-blue-200 px-5 py-2.5 rounded-lg hover:bg-blue-100 font-medium text-sm transition-colors">
                                Edit
                            </a>
                            <form action="/delete-task" method="post" class="inline">
                                <input type="hidden" name="taskId" th:value="${task.id}">
                                <button class="bg-red-50 text-red-700 border border-red-200 px-5 py-2.5 rounded-lg hover:bg-red-100 font-medium text-sm transition-colors">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-24">
        <div class="w-16 h-16 mx-auto rounded-2xl bg-purple-100 flex items-center justify-center text-purple-500 text-2xl mb-4">📋</div>
        <p class="text-gray-600 text-xl font-medium">No tasks yet</p>
        <p class="text-gray-400 mt-1">Create your first one using the form above!</p>
    </div>
</div>

</body>
</html>
