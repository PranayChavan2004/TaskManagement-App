<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TaskHelp</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: linear-gradient(135deg,#4f46e5,#7c3aed,#2563eb);
            background-size:300% 300%;
            animation:gradient 10s ease infinite;
        }

        @keyframes gradient{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .glass-card{
            background:rgba(255,255,255,.95);
            backdrop-filter:blur(15px);
            box-shadow:0 20px 45px rgba(0,0,0,.15);
        }

        .input-box{
            transition:.3s;
        }

        .input-box:focus{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(79,70,229,.15);
        }

        .register-btn{
            transition:.3s;
        }

        .register-btn:hover{
            transform:translateY(-3px);
        }

    </style>

</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-5xl grid lg:grid-cols-2 rounded-3xl overflow-hidden shadow-2xl">

    <!-- Left Side -->

    <div class="hidden lg:flex flex-col justify-center bg-white/10 backdrop-blur-md text-white p-12">

        <h1 class="text-5xl font-bold mb-6">
            TaskHelp
        </h1>

        <p class="text-lg leading-8 opacity-90">

            Create your account and start organizing your work with
            a clean, secure and productive task management system.

        </p>

        <div class="mt-12 space-y-5">

            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-green-400"></div>
                <span>Create and Manage Tasks</span>
            </div>

            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-yellow-300"></div>
                <span>Track Your Progress</span>
            </div>

            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-pink-400"></div>
                <span>Fast & Secure Access</span>
            </div>

        </div>

    </div>

    <!-- Register Form -->

    <div class="glass-card p-10 lg:p-14">

        <h2 class="text-4xl font-bold text-center text-indigo-600">
            Create Account
        </h2>

        <p class="text-center text-gray-500 mt-3 mb-8">

            Join TaskHelp and start managing your daily tasks.

        </p>

        <form action="/register" method="post" class="space-y-6">

            <div>

                <label class="block text-gray-700 font-medium mb-2">
                    Username
                </label>

                <input
                        type="text"
                        name="username"
                        placeholder="Choose a username"
                        required
                        class="input-box w-full px-5 py-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-400">

            </div>

            <div>

                <label class="block text-gray-700 font-medium mb-2">
                    Email Address
                </label>

                <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                        class="input-box w-full px-5 py-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-400">

            </div>

            <div>

                <label class="block text-gray-700 font-medium mb-2">
                    Password
                </label>

                <input
                        type="password"
                        name="password"
                        placeholder="Create a password"
                        required
                        class="input-box w-full px-5 py-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-400">

            </div>

            <button
                    type="submit"
                    class="register-btn w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-4 rounded-xl text-lg font-semibold hover:from-indigo-700 hover:to-purple-700">

                Create Account

            </button>

        </form>

        <p class="text-center mt-8 text-gray-600">

            Already have an account?

            <a href="/login"
               class="text-indigo-600 font-semibold hover:underline">

                Login

            </a>

        </p>

    </div>

</div>

</body>
</html>
