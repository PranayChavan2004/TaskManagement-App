<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - TaskFlow</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed,#2563eb);
            background-size:300% 300%;
            animation:bgAnimation 10s ease infinite;
        }

        @keyframes bgAnimation{
            0%{
                background-position:0% 50%;
            }
            50%{
                background-position:100% 50%;
            }
            100%{
                background-position:0% 50%;
            }
        }

        .glass-card{
            background:rgba(255,255,255,.96);
            backdrop-filter:blur(18px);
            box-shadow:0 20px 45px rgba(0,0,0,.18);
        }

        .input-box{
            transition:.3s;
        }

        .input-box:focus{
            transform:translateY(-2px);
            box-shadow:0 12px 22px rgba(79,70,229,.15);
        }

        .btn{
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
        }

    </style>

</head>

<body class="min-h-screen flex items-center justify-center px-6 py-10">

<div class="glass-card rounded-3xl w-full max-w-3xl p-10">

    <div class="text-center mb-10">

        <h1 class="text-4xl font-bold text-indigo-600">
            Edit Task
        </h1>

        <p class="text-gray-500 mt-3">
            Update your task details and keep everything organized.
        </p>

    </div>

    <form
            th:action="@{/edit-task/{id}(id=${task.id})}"
            method="post"
            class="space-y-7">

        <!-- Title -->

        <div>

            <label class="block text-gray-700 font-semibold mb-2">
                Task Title
            </label>

            <input
                    type="text"
                    name="title"
                    th:value="${task.title}"
                    required
                    class="input-box w-full px-5 py-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-400">

        </div>

        <!-- Description -->

        <div>

            <label class="block text-gray-700 font-semibold mb-2">
                Description
            </label>

            <textarea
                    name="description"
                    rows="6"
                    th:text="${task.description}"
                    class="input-box w-full px-5 py-4 border border-gray-300 rounded-xl resize-none focus:outline-none focus:ring-4 focus:ring-indigo-400"></textarea>

        </div>

        <!-- Status -->

        <div>

            <label class="block text-gray-700 font-semibold mb-2">
                Task Status
            </label>

            <select
                    name="status"
                    class="input-box w-full px-5 py-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-400">

                <option
                        value="TODO"
                        th:selected="${task.status == 'TODO'}">

                    To Do

                </option>

                <option
                        value="IN_PROGRESS"
                        th:selected="${task.status == 'IN_PROGRESS'}">

                    In Progress

                </option>

                <option
                        value="DONE"
                        th:selected="${task.status == 'DONE'}">

                    Completed

                </option>

            </select>

        </div>

        <!-- Buttons -->

        <div class="grid md:grid-cols-2 gap-5 pt-4">

            <button
                    type="submit"
                    class="btn bg-gradient-to-r from-green-500 to-emerald-600 text-white py-4 rounded-xl font-semibold text-lg hover:from-green-600 hover:to-emerald-700">

                Save Changes

            </button>

            <a
                    href="/home"
                    class="btn bg-gray-700 text-white py-4 rounded-xl font-semibold text-lg text-center hover:bg-gray-800">

                Cancel

            </a>

        </div>

    </form>

</div>

</body>
</html>
